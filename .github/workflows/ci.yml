name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: modwire/modwire/.github/workflows/python-package.yml@workflows-v1
    with:
      python-versions: '["3.12", "3.13", "3.14"]'
      build-python-version: "3.12"

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/generate_docs.py --check
      - run: python scripts/generate_schemas.py --check
      - run: python scripts/generate_compatibility.py --check

  mermaid-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [minimum, latest-11]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "24.17.0"
          cache: npm
          cache-dependency-path: compatibility/toolchains/${{ matrix.lane }}/package-lock.json
      - run: python -m pip install -e .
      - run: python scripts/generate_compatibility.py --check
      - run: npm ci --prefix compatibility/toolchains/${{ matrix.lane }}
      - run: node compatibility/runner.mjs ${{ matrix.lane }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mermaid-compatibility-${{ matrix.lane }}
          path: .compatibility-artifacts/${{ matrix.lane }}

  package-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_package_contents.py dist
      - run: |
          python -m venv /tmp/modwire-wheel
          /tmp/modwire-wheel/bin/pip install dist/*.whl
          /tmp/modwire-wheel/bin/python -c "from modwire_mermaid.composition import ModwireMermaidFactory; assert ModwireMermaidFactory.standard()"
      - run: |
          python -m venv /tmp/modwire-sdist
          /tmp/modwire-sdist/bin/pip install dist/*.tar.gz
          /tmp/modwire-sdist/bin/python -c "from modwire_mermaid.composition import ModwireMermaidFactory; assert ModwireMermaidFactory.standard()"
